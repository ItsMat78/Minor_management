name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend unit & integration tests ────────────────────────────────────────
  backend:
    name: Backend (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      # Cache the MongoDB binary downloaded by mongodb-memory-server
      - uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}

      - run: npm ci

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: ci-test-jwt-secret-github-actions

  # ── Frontend component tests ─────────────────────────────────────────────────
  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - run: npm ci

      - name: Run tests
        run: npx vitest run

  # ── E2E tests (Playwright + real servers + MongoDB) ──────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]  # Only run if unit tests pass

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install all three package sets
      - run: npm ci
        working-directory: server
      - run: npm ci
        working-directory: client
      - run: npm ci
        working-directory: e2e

      # Cache Playwright browser binary
      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}

      - name: Install Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        working-directory: e2e

      - name: Run E2E tests
        run: npm test
        working-directory: e2e
        env:
          CI: true
          E2E_MONGO_URI: mongodb://localhost:27017/minor_management_e2e
